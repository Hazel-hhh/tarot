<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="塔罗学习与占卜工具 - 看画面、说直觉、学牌义">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✦</text></svg>">
<title>塔罗学习工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0c1a;
    color: #e8e0f0;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 2rem;
    color: #c9a96e;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    color: #8a7a9a;
    font-size: 0.9rem;
    margin-bottom: 30px;
    letter-spacing: 2px;
    text-align: center;
  }
  button {
    padding: 12px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .reveal-area {
    width: 100%;
    max-width: 700px;
    display: none;
  }
  .reveal-card {
    background: #1a1628;
    border: 1px solid #c9a96e44;
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 20px;
  }
  .reveal-title {
    font-size: 1.4rem;
    color: #c9a96e;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .reveal-subtitle {
    color: #8a7a9a;
    font-size: 0.85rem;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .keyword {
    background: #2a1f4a;
    color: #c9a96e;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
  }
  .meaning-block {
    margin-bottom: 18px;
  }
  .meaning-label {
    color: #a06ee0;
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .meaning-text {
    color: #d0c8e0;
    line-height: 1.8;
    font-size: 0.95rem;
  }
  .btn-next {
    background: linear-gradient(135deg, #c9a96e, #a07840);
    color: white;
    width: 100%;
    max-width: 700px;
    padding: 14px;
    font-size: 1.05rem;
    letter-spacing: 2px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.2s;
  }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  .upright-reversed {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
  }
  .ur-block {
    background: #1e1a2e;
    border-radius: 8px;
    padding: 12px;
  }
  .ur-label {
    font-size: 0.75rem;
    color: #8a7a9a;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .ur-text { color: #d0c8e0; font-size: 0.9rem; line-height: 1.6; }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    h1 { font-size: 1.4rem; letter-spacing: 2px; }
    .subtitle { font-size: 0.8rem; margin-bottom: 20px; }
    .reveal-card { padding: 18px 16px; }

    button { font-size: 0.95rem; padding: 12px 16px; }
    .reveal-title { font-size: 1.2rem; }
    .upright-reversed { grid-template-columns: 1fr; gap: 8px; }
    .meaning-text, .ur-text { font-size: 0.9rem; }

  }

  /* 占卜卡片 */
  .div-cards-wrap { display:flex; flex-wrap:wrap; gap:14px; margin-bottom:10px; }
  .div-card { flex:1; min-width:140px; background:#1a1628; border-radius:12px; padding:16px; cursor:pointer; }
  .div-card-up { border:1px solid #2e3a2e; }
  .div-card-rev { border:1px solid #5a2e2e; }
  .div-label { color:#8a7a9a; font-size:0.75rem; letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
  .div-name { color:#c9a96e; font-size:1rem; margin-bottom:4px; }
  .div-name-en { color:#6a5a7a; font-size:0.8rem; margin-bottom:8px; }
  .div-hint { color:#8a7a9a; font-size:0.8rem; line-height:1.5; }
  .div-detail { display:none; margin-top:12px; border-top:1px solid #2a2440; padding-top:12px; }
  .div-detail.open { display:block; }
  .div-pos-up { color:#6ec86e; font-size:0.75rem; letter-spacing:1px; margin-left:6px; }
  .div-pos-rev { color:#e07070; font-size:0.75rem; letter-spacing:1px; margin-left:6px; }
  .div-rotated { transform:rotate(180deg); display:inline-block; }
  .div-ur-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .div-ur-cell { border-radius:8px; padding:10px; }
  .div-ur-dim { background:#1e1a2e; border:1px solid #2a2440; }
  .div-ur-act-up { background:#1a2e1a; border:1px solid #2a5a2a; }
  .div-ur-act-rev { background:#2e1a1a; border:1px solid #5a2a2a; }
  .div-ur-lbl { font-size:0.75rem; letter-spacing:1px; margin-bottom:4px; }
  .div-ur-lbl-up { color:#6ec86e; }
  .div-ur-lbl-rev { color:#e07070; }
  .div-ur-lbl-dim { color:#8a7a9a; }
  .div-ur-val { color:#d0c8e0; font-size:0.85rem; line-height:1.6; }
  .div-fb { margin-top:10px; color:#b0a0c8; font-size:0.85rem; line-height:1.7; font-style:italic; }
  .div-clear { background:none; border:1px solid #3a2e5a; color:#8a7a9a; padding:6px 20px; border-radius:20px; cursor:pointer; font-size:0.85rem; font-family:inherit; }
  .div-kw { background:#2a1f4a; color:#c9a96e; padding:3px 10px; border-radius:20px; font-size:0.8rem; }
  .div-core { color:#d0c8e0; font-size:0.9rem; line-height:1.7; margin-bottom:10px; }
  .div-kw-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  @media (max-width: 400px) {
    .div-cards-wrap { gap:8px; }
    .div-card { min-width:100%; }
    .div-ur-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<h1>✦ 塔罗 ✦</h1>
<p class="subtitle">看画面 · 说直觉 · 学牌义</p>

<!-- Tab 切换 -->
<div style="width:100%;max-width:700px;display:flex;gap:0;margin-bottom:24px;border:1px solid #3a2e5a;border-radius:10px;overflow:hidden;">
  <button id="tab-learn" onclick="switchTab('learn')" style="flex:1;padding:12px;background:linear-gradient(135deg,#a06ee0,#7040b0);color:white;border:none;cursor:pointer;font-size:0.95rem;font-family:inherit;letter-spacing:2px;">学习</button>
  <button id="tab-divination" onclick="switchTab('divination')" style="flex:1;padding:12px;background:#1a1628;color:#8a7a9a;border:none;cursor:pointer;font-size:0.95rem;font-family:inherit;letter-spacing:2px;">占卜</button>
</div>

<!-- 学习模块 -->
<div id="module-learn">
<div style="width:100%;max-width:700px;color:#8a7a9a;font-size:0.85rem;letter-spacing:1px;margin-bottom:16px;">选一张牌，描述你看到的，再揭晓牌义</div>

<!-- 选牌区 -->
<div id="cardPickerArea" style="width:100%;max-width:700px;background:#1a1628;border:1px solid #3a2e5a;border-radius:16px;padding:20px 16px;margin-bottom:20px;box-sizing:border-box;">
  <div style="color:#c9a96e;font-size:0.9rem;letter-spacing:2px;margin-bottom:16px;text-transform:uppercase;">✦ 选一张牌</div>
  <div style="color:#8a7a9a;font-size:0.85rem;margin-bottom:14px;">选你感兴趣的，或者随机抽一张：</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
    <button onclick="pickRandom()" style="background:linear-gradient(135deg,#a06ee0,#7040b0);color:white;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;">随机抽牌</button>
    <button onclick="toggleCardList()" id="btnToggleList" style="background:#2a1f4a;color:#c9a96e;border:1px solid #c9a96e44;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;">浏览选牌 ▲</button>
  </div>
  <div id="cardListPanel" style="margin-top:12px;display:block;">
  <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding:4px;">
    <!-- 动态生成 -->
  </div>
  </div>
</div>

<!-- 选牌后直接展示牌义 -->
<div class="reveal-area" id="revealArea" style="display:none;">
  <div class="reveal-card">
    <div class="reveal-title" id="revealName"></div>
    <div class="reveal-subtitle" id="revealSub"></div>
    <div class="keywords" id="revealKeywords"></div>
    <!-- 牌面场景描述 -->
    <div class="meaning-block">
      <div class="meaning-label">牌面描述</div>
      <div class="meaning-text" id="revealScene" style="font-style:italic;color:#b0a0c8;"></div>
    </div>
    <div class="meaning-block">
      <div class="meaning-label">核心含义</div>
      <div class="meaning-text" id="revealCore"></div>
    </div>
    <div class="upright-reversed">
      <div class="ur-block">
        <div class="ur-label">正位</div>
        <div class="ur-text" id="revealUpright"></div>
      </div>
      <div class="ur-block">
        <div class="ur-label">逆位</div>
        <div class="ur-text" id="revealReversed"></div>
      </div>
    </div>
    <div class="meaning-block" style="margin-top:16px;">
      <div class="meaning-label">直觉感悟</div>
      <div class="meaning-text" style="color:#b0a0c8;font-style:italic;" id="revealFeedback"></div>
    </div>
  </div>
  <div style="display:flex;gap:12px;max-width:700px;width:100%;flex-wrap:wrap;">
    <button class="btn-next" onclick="showCardPicker()" style="flex:1;min-width:140px;">选其他牌 →</button>
  </div>
</div>




</div><!-- end module-learn -->

<!-- 占卜模块 -->
<div id="module-divination" style="display:none;width:100%;max-width:700px;">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="color:#8a7a9a;font-size:0.85rem;letter-spacing:1px;">先在心里想好你的问题，再选择牌阵</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;">
    <button onclick="divination(1)" style="background:#1a1628;border:1px solid #c9a96e44;color:#c9a96e;padding:18px 10px;border-radius:12px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;transition:all 0.2s;">
      <div style="font-size:1.4rem;margin-bottom:6px;">✦</div>
      单张牌
      <div style="font-size:0.75rem;color:#8a7a9a;margin-top:4px;">当下能量</div>
    </button>
    <button onclick="divination(3)" style="background:#1a1628;border:1px solid #c9a96e44;color:#c9a96e;padding:18px 10px;border-radius:12px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;transition:all 0.2s;">
      <div style="font-size:1.4rem;margin-bottom:6px;">✦✦✦</div>
      三张牌
      <div style="font-size:0.75rem;color:#8a7a9a;margin-top:4px;">过去·现在·未来</div>
    </button>
    <button onclick="divination(10)" style="background:#1a1628;border:1px solid #c9a96e44;color:#c9a96e;padding:18px 10px;border-radius:12px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;transition:all 0.2s;">
      <div style="font-size:1.4rem;margin-bottom:6px;">⊕</div>
      凯尔特十张
      <div style="font-size:0.75rem;color:#8a7a9a;margin-top:4px;">完整牌阵</div>
    </button>
  </div>
  <div id="divinationResult"></div>
</div>

<script>



let CARDS = [];

async function init() {
  try {
    const res = await fetch('cards.json');
    CARDS = await res.json();
    renderCardList();
  } catch(e) { console.error('Failed to load cards:', e); }
  showCardPicker();
}

function renderCardList() {
  const listDiv = document.querySelector('#cardListPanel > div');
  if (!listDiv) return;
  listDiv.innerHTML = CARDS.map(c => {
    return `<button onclick="pickCard(${c.id})" style="background:#1e1a2e;color:#b0a0c8;border:1px solid #2a2440;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:inherit;letter-spacing:0.5px;">${c.name}</button>`;
  }).join('');
}

function showCardPicker() {
  document.getElementById('cardPickerArea').style.display = 'block';
  document.getElementById('revealArea').style.display = 'none';
  renderCardList();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function toggleCardList() {
  const panel = document.getElementById('cardListPanel');
  const btn = document.getElementById('btnToggleList');
  if (panel.style.display === 'none') {
    document.getElementById('revealArea').style.display = 'none';
    document.getElementById('cardPickerArea').style.display = 'block';
    panel.style.display = 'block';
    btn.textContent = '浏览选牌 ▲';
  } else {
    panel.style.display = 'none';
    btn.textContent = '浏览选牌 ▼';
  }
}

function pickRandom() {
  const card = CARDS[Math.floor(Math.random() * CARDS.length)];
  showCard(card);
}

function pickCard(id) {
  const card = CARDS.find(c => c.id === id);
  if (card) showCard(card);
}

function showCard(card) {
  document.getElementById('cardPickerArea').style.display = 'none';
  document.getElementById('revealArea').style.display = 'none';

  // 直接填充并展示牌义
  document.getElementById('revealName').textContent = card.name;
  document.getElementById('revealSub').textContent = card.nameEn + ' · ' + card.category;
  document.getElementById('revealKeywords').innerHTML =
    card.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
  document.getElementById('revealScene').textContent = card.scene;
  document.getElementById('revealCore').textContent = card.core;
  document.getElementById('revealUpright').textContent = card.upright;
  document.getElementById('revealReversed').textContent = card.reversed;
  document.getElementById('revealFeedback').textContent = card.feedback;

  document.getElementById('revealArea').style.display = 'block';

  renderCardList();
  window.scrollTo({top: 0, behavior: 'smooth'});
}



function switchTab(tab) {
  const isLearn = tab === 'learn';
  document.getElementById('module-learn').style.display = isLearn ? '' : 'none';
  document.getElementById('module-divination').style.display = isLearn ? 'none' : '';
  document.getElementById('tab-learn').style.background = isLearn ? 'linear-gradient(135deg,#a06ee0,#7040b0)' : '#1a1628';
  document.getElementById('tab-learn').style.color = isLearn ? 'white' : '#8a7a9a';
  document.getElementById('tab-divination').style.background = isLearn ? '#1a1628' : 'linear-gradient(135deg,#c9a96e,#a07840)';
  document.getElementById('tab-divination').style.color = isLearn ? '#8a7a9a' : 'white';
}

function divination(n) {
  const pool = [...CARDS];
  const picked = [];
  for (let i = 0; i < n && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    picked.push({ card: pool.splice(idx, 1)[0], reversed: Math.random() < 0.5 });
  }
  const labelMap = { 1: ['当下能量'], 3: ['过去','现在','未来'], 10: ['当下处境','阻碍','意识层','潜意识层','过去影响','近期未来','你的态度','外部影响','希望与恐惧','最终结果'] };
  const labels = labelMap[n] || [];
  const container = document.getElementById('divinationResult');
  let h = '<div class="div-cards-wrap">';
  picked.forEach(({ card, reversed }, i) => {
    const rot = reversed ? 'div-rotated' : '';
    const posCls = reversed ? 'div-pos-rev' : 'div-pos-up';
    const posText = reversed ? '逆位' : '正位';
    const cardCls = reversed ? 'div-card div-card-rev' : 'div-card div-card-up';
    const upAct = !reversed;
    h += `<div class="${cardCls}" onclick="toggleCardDetail(${i})">
      <div class="div-label">${labels[i] || '第'+(i+1)+'张'}</div>
      <div class="div-name"><span class="${rot}">⊕</span> ${card.name} <span class="${posCls}">${posText}</span></div>
      <div class="div-name-en">${card.nameEn}</div>
      <div class="div-hint">点击展开详情</div>
      <div class="div-detail" id="detail-${i}">
        <div class="div-kw-wrap">${card.keywords.map(k=>`<span class="div-kw">${k}</span>`).join('')}</div>
        <div class="div-core">${card.core}</div>
        <div class="div-ur-grid">
          <div class="div-ur-cell ${upAct?'div-ur-act-up':'div-ur-dim'}">
            <div class="div-ur-lbl ${upAct?'div-ur-lbl-up':'div-ur-lbl-dim'}">正位${upAct?' ◀ 当前':''}</div>
            <div class="div-ur-val">${card.upright}</div>
          </div>
          <div class="div-ur-cell ${!upAct?'div-ur-act-rev':'div-ur-dim'}">
            <div class="div-ur-lbl ${!upAct?'div-ur-lbl-rev':'div-ur-lbl-dim'}">逆位${!upAct?' ◀ 当前':''}</div>
            <div class="div-ur-val">${card.reversed}</div>
          </div>
        </div>
        <div class="div-fb">${card.feedback}</div>
      </div>
    </div>`;
  });
  h += '</div>';
  h += '<div style="text-align:center;margin-top:10px;"><button class="div-clear" onclick="document.getElementById(\'divinationResult\').style.display=\'none\'">清除</button></div>';
  container.innerHTML = h;
  container.style.display = 'block';
  container.scrollIntoView({behavior:'smooth'});
}

function toggleCardDetail(i) {
  document.getElementById('detail-'+i).classList.toggle('open');
}

init();
</script>
</body>
</html>
