<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗学习工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0c1a;
    color: #e8e0f0;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
  }
  h1 {
    font-size: 2rem;
    color: #c9a96e;
    letter-spacing: 4px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    color: #8a7a9a;
    font-size: 0.9rem;
    margin-bottom: 30px;
    letter-spacing: 2px;
    text-align: center;
  }
  .progress-bar {
    width: 100%;
    max-width: 700px;
    background: #1e1a2e;
    border-radius: 20px;
    height: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9a96e, #a06ee0);
    border-radius: 20px;
    transition: width 0.5s ease;
  }
  .progress-text {
    font-size: 0.8rem;
    color: #8a7a9a;
    text-align: right;
    max-width: 700px;
    width: 100%;
    margin-bottom: 20px;
  }
  .card-area {
    width: 100%;
    max-width: 700px;
    background: #1a1628;
    border: 1px solid #3a2e5a;
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 20px;
    position: relative;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .card-category {
    background: #2a1f4a;
    color: #a06ee0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  .card-number {
    color: #8a7a9a;
    font-size: 0.9rem;
  }
  .scene-title {
    color: #c9a96e;
    font-size: 1rem;
    letter-spacing: 2px;
    margin-bottom: 15px;
    text-transform: uppercase;
  }
  .scene-text {
    line-height: 1.9;
    color: #d0c8e0;
    font-size: 1.05rem;
    background: #120f20;
    border-left: 3px solid #a06ee0;
    padding: 16px 20px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 20px;
    font-style: italic;
  }
  .questions {
    margin-bottom: 20px;
  }
  .question {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    color: #b0a0c8;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  .question-num {
    color: #c9a96e;
    font-weight: bold;
    min-width: 20px;
  }
  textarea {
    width: 100%;
    background: #120f20;
    border: 1px solid #3a2e5a;
    border-radius: 8px;
    color: #e8e0f0;
    font-family: inherit;
    font-size: 1rem;
    padding: 14px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.3s;
    line-height: 1.7;
  }
  textarea:focus { border-color: #a06ee0; }
  textarea::placeholder { color: #4a3e6a; }
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  button {
    padding: 12px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-reveal {
    background: linear-gradient(135deg, #a06ee0, #7040b0);
    color: white;
    flex: 1;
  }
  .btn-reveal:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-skip {
    background: #2a1f4a;
    color: #8a7a9a;
    padding: 12px 20px;
  }
  .btn-skip:hover { background: #3a2e5a; color: #b0a0c8; }
  .reveal-area {
    width: 100%;
    max-width: 700px;
    display: none;
  }
  .reveal-card {
    background: #1a1628;
    border: 1px solid #c9a96e44;
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 20px;
  }
  .reveal-title {
    font-size: 1.4rem;
    color: #c9a96e;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .reveal-subtitle {
    color: #8a7a9a;
    font-size: 0.85rem;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .keyword {
    background: #2a1f4a;
    color: #c9a96e;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
  }
  .meaning-block {
    margin-bottom: 18px;
  }
  .meaning-label {
    color: #a06ee0;
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .meaning-text {
    color: #d0c8e0;
    line-height: 1.8;
    font-size: 0.95rem;
  }
  .comparison {
    background: #120f20;
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
  }
  .comparison-title {
    color: #a06ee0;
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .user-answer-display {
    color: #b0e0b0;
    font-style: italic;
    line-height: 1.7;
    margin-bottom: 10px;
    font-size: 0.95rem;
  }
  .feedback-text {
    color: #d0c8e0;
    line-height: 1.8;
    font-size: 0.95rem;
  }
  .btn-next {
    background: linear-gradient(135deg, #c9a96e, #a07840);
    color: white;
    width: 100%;
    max-width: 700px;
    padding: 14px;
    font-size: 1.05rem;
    letter-spacing: 2px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.2s;
  }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }
  .mastered-list {
    width: 100%;
    max-width: 700px;
    background: #1a1628;
    border: 1px solid #3a2e5a;
    border-radius: 16px;
    padding: 20px 30px;
    margin-bottom: 20px;
  }
  .mastered-title {
    color: #8a7a9a;
    font-size: 0.8rem;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .mastered-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
  }
  .chip-learned {
    background: #1a3a1a;
    color: #6ec86e;
    border: 1px solid #2a5a2a;
  }
  .chip-pending {
    background: #1e1a2e;
    color: #4a3e6a;
    border: 1px solid #2a2440;
  }
  .complete-screen {
    display: none;
    text-align: center;
    width: 100%;
    max-width: 700px;
  }
  .complete-icon { font-size: 4rem; margin-bottom: 16px; }
  .complete-title { color: #c9a96e; font-size: 1.6rem; letter-spacing: 4px; margin-bottom: 12px; }
  .complete-text { color: #b0a0c8; line-height: 1.8; margin-bottom: 24px; }
  .btn-restart {
    background: #2a1f4a;
    color: #c9a96e;
    border: 1px solid #c9a96e44;
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    letter-spacing: 2px;
    font-family: inherit;
  }
  .divider {
    border: none;
    border-top: 1px solid #2a2440;
    margin: 16px 0;
  }
  .upright-reversed {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 10px;
  }
  .ur-block {
    background: #1e1a2e;
    border-radius: 8px;
    padding: 12px;
  }
  .ur-label {
    font-size: 0.75rem;
    color: #8a7a9a;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .ur-text { color: #d0c8e0; font-size: 0.9rem; line-height: 1.6; }
  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    h1 { font-size: 1.4rem; letter-spacing: 2px; }
    .subtitle { font-size: 0.8rem; margin-bottom: 20px; }
    .card-area, .reveal-card { padding: 18px 16px; }
    .scene-text { font-size: 0.95rem; padding: 12px 14px; }
    .question { font-size: 0.9rem; }
    textarea { font-size: 0.95rem; padding: 12px; min-height: 80px; }
    button { font-size: 0.95rem; padding: 12px 16px; }
    .btn-reveal { padding: 14px; font-size: 1rem; }
    .reveal-title { font-size: 1.2rem; }
    .upright-reversed { grid-template-columns: 1fr; gap: 8px; }
    .mastered-list { padding: 14px 16px; }
    .chip { font-size: 0.75rem; padding: 3px 10px; }
    .meaning-text, .feedback-text, .ur-text { font-size: 0.9rem; }
    .complete-icon { font-size: 3rem; }
    .complete-title { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<h1>✦ 塔罗 ✦</h1>
<p class="subtitle">看画面 · 说直觉 · 学牌义</p>

<!-- Tab 切换 -->
<div style="width:100%;max-width:700px;display:flex;gap:0;margin-bottom:24px;border:1px solid #3a2e5a;border-radius:10px;overflow:hidden;">
  <button id="tab-learn" onclick="switchTab('learn')" style="flex:1;padding:12px;background:linear-gradient(135deg,#a06ee0,#7040b0);color:white;border:none;cursor:pointer;font-size:0.95rem;font-family:inherit;letter-spacing:2px;">学习</button>
  <button id="tab-divination" onclick="switchTab('divination')" style="flex:1;padding:12px;background:#1a1628;color:#8a7a9a;border:none;cursor:pointer;font-size:0.95rem;font-family:inherit;letter-spacing:2px;">占卜</button>
</div>

<!-- 学习模块 -->
<div id="module-learn">
<div style="width:100%;max-width:700px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
  <div style="color:#8a7a9a;font-size:0.85rem;letter-spacing:1px;">选一张牌，描述你看到的，再揭晓牌义</div>
  <button onclick="resetAll()" style="background:none;border:1px solid #3a2e5a;color:#8a7a9a;padding:4px 14px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:inherit;letter-spacing:1px;">重置进度</button>
</div>

<!-- 选牌区 -->
<div id="cardPickerArea" style="width:100%;background:#1a1628;border:1px solid #3a2e5a;border-radius:16px;padding:20px 16px;margin-bottom:20px;box-sizing:border-box;">
  <div style="color:#c9a96e;font-size:0.9rem;letter-spacing:2px;margin-bottom:16px;text-transform:uppercase;">✦ 选一张牌</div>
  <div style="color:#8a7a9a;font-size:0.85rem;margin-bottom:14px;">选你感兴趣的，或者随机抽一张：</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
    <button onclick="pickRandom()" style="background:linear-gradient(135deg,#a06ee0,#7040b0);color:white;border:none;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;">随机抽牌</button>
    <button onclick="toggleCardList()" id="btnToggleList" style="background:#2a1f4a;color:#c9a96e;border:1px solid #c9a96e44;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;">浏览选牌 ▲</button>
  </div>
</div>
<div id="cardListPanel" style="width:100%;background:#1a1628;border:1px solid #3a2e5a;border-radius:16px;padding:16px;margin-bottom:20px;display:block;box-sizing:border-box;">
  <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding:4px;">
    <!-- 动态生成 -->
  </div>
</div>

<!-- 选牌后直接展示牌义 -->
<div class="reveal-area" id="revealArea" style="display:none;">
  <div class="reveal-card">
    <div class="reveal-title" id="revealName"></div>
    <div class="reveal-subtitle" id="revealSub"></div>
    <div class="keywords" id="revealKeywords"></div>
    <!-- 牌面场景描述 -->
    <div class="meaning-block">
      <div class="meaning-label">牌面描述</div>
      <div class="meaning-text" id="revealScene" style="font-style:italic;color:#b0a0c8;"></div>
    </div>
    <div class="meaning-block">
      <div class="meaning-label">核心含义</div>
      <div class="meaning-text" id="revealCore"></div>
    </div>
    <div class="upright-reversed">
      <div class="ur-block">
        <div class="ur-label">正位</div>
        <div class="ur-text" id="revealUpright"></div>
      </div>
      <div class="ur-block">
        <div class="ur-label">逆位</div>
        <div class="ur-text" id="revealReversed"></div>
      </div>
    </div>
    <div class="meaning-block" style="margin-top:16px;">
      <div class="meaning-label">直觉感悟</div>
      <div class="meaning-text" style="color:#b0a0c8;font-style:italic;" id="revealFeedback"></div>
    </div>
  </div>
  <div style="display:flex;gap:12px;max-width:700px;width:100%;flex-wrap:wrap;">
    <button class="btn-next" onclick="showCardPicker()" style="flex:1;min-width:140px;">选其他牌 →</button>
  </div>
</div>



<div class="complete-screen" id="completeScreen">
  <div class="complete-icon">✦</div>
  <div class="complete-title">全部完成</div>
  <div class="complete-text">你已经完成了这一轮的塔罗学习。<br>每一次练习都在加深你的直觉感知。</div>
  <div style="display:flex;gap:12px;justify-content:center;">
    <button class="btn-restart" onclick="restart()">重新洗牌</button>
    <button class="btn-restart" onclick="resetAll()" style="background:#1a1628;border-color:#e05050;color:#e05050;">清空进度重来</button>
  </div>
</div>
</div><!-- end module-learn -->

<!-- 占卜模块 -->
<div id="module-divination" style="display:none;width:100%;max-width:700px;">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="color:#8a7a9a;font-size:0.85rem;letter-spacing:1px;">先在心里想好你的问题，再选择牌阵</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;">
    <button onclick="divination(1)" style="background:#1a1628;border:1px solid #c9a96e44;color:#c9a96e;padding:18px 10px;border-radius:12px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;transition:all 0.2s;">
      <div style="font-size:1.4rem;margin-bottom:6px;">✦</div>
      单张牌
      <div style="font-size:0.75rem;color:#8a7a9a;margin-top:4px;">当下能量</div>
    </button>
    <button onclick="divination(3)" style="background:#1a1628;border:1px solid #c9a96e44;color:#c9a96e;padding:18px 10px;border-radius:12px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;transition:all 0.2s;">
      <div style="font-size:1.4rem;margin-bottom:6px;">✦✦✦</div>
      三张牌
      <div style="font-size:0.75rem;color:#8a7a9a;margin-top:4px;">过去·现在·未来</div>
    </button>
    <button onclick="divination(10)" style="background:#1a1628;border:1px solid #c9a96e44;color:#c9a96e;padding:18px 10px;border-radius:12px;cursor:pointer;font-size:0.9rem;font-family:inherit;letter-spacing:1px;transition:all 0.2s;">
      <div style="font-size:1.4rem;margin-bottom:6px;">⊕</div>
      凯尔特十张
      <div style="font-size:0.75rem;color:#8a7a9a;margin-top:4px;">完整牌阵</div>
    </button>
  </div>
  <div id="divinationResult"></div>
</div>

<script>

const CARDS = [{"id":0,"name":"0号 愚者","nameEn":"The Fool","category":"大阿卡纳","keywords":["新开始","天真","勇气","未知","冒险","信任"],"scene":"一个年轻人背着小包袱，站在悬崖边缘，仰望天空，脚边有一条小狗在叫。他的步伐轻盈，像是随时要踏出那一步。远处是广阔的山脉。","questions":["他知道前面是悬崖吗？","他看起来害怕吗？","你觉得这张牌说的是什么样的人或状态？"],"core":"不带任何包袱踏上未知旅程。愚者不是真的愚蠢，而是选择相信未知、活在当下。他的「无知」是一种勇气，不被过去束缚，不被未来恐惧。","upright":"新开始、冒险、天真的勇气、跟随内心出发","reversed":"冲动莽撞、逃避现实、准备不足、拒绝成长","feedback":"愚者最难解读的地方在于：他看起来「傻」，但这种傻其实是最高级的勇气——不计后果地相信自己。你的直觉里捕捉到了什么？"},{"id":1,"name":"1号 魔术师","nameEn":"The Magician","category":"大阿卡纳","keywords":["意志力","创造","行动","资源","实现"],"scene":"一个男人站在桌前，一手指向天空，一手指向大地。桌上摆着四样东西：权杖、圣杯、宝剑、星币。他头顶有个∞符号，腰间缠绕着一条咬住自己尾巴的蛇。","questions":["他为什么一手指天一手指地？","桌上四样东西代表什么？","你觉得这个人具备什么能力？"],"core":"「如其在上，如其在下」——魔术师是天地之间的管道，他能把想法（天）变成现实（地）。他手边有所有需要的工具，关键是他有意志力去用它们。","upright":"意志力强、有能力实现目标、掌握资源、行动力","reversed":"操控他人、欺骗、能力空谈不行动、资源浪费","feedback":"魔术师牌出现时往往在说：你已经拥有了所需要的一切，现在只差去做。它是「可以」的能量。"},{"id":2,"name":"2号 女祭司","nameEn":"The High Priestess","category":"大阿卡纳","keywords":["直觉","内在智慧","神秘","潜意识","等待"],"scene":"一个女人静静坐在两根柱子之间，一根黑柱一根白柱。她手里捧着一卷经文，身后是一块布帘，帘子后隐约可见平静的水面。她的表情平静，没有说话。","questions":["她为什么不说话？","那块布帘后面藏着什么？","你觉得向她问问题，她会怎么回答你？"],"core":"女祭司代表内在的智慧，不是外显的行动，而是向内看。她知道答案，但不急着说——真正的智慧往往需要安静才能听见。她守护着潜意识的门。","upright":"直觉准确、需要向内寻找答案、秘密、安静等待","reversed":"压抑直觉、信息隐藏、过度依赖他人判断、秘密被揭露","feedback":"女祭司在牌阵里出现，往往是在说：别急，答案在你内心深处，先安静下来听一听。"},{"id":3,"name":"3号 女皇","nameEn":"The Empress","category":"大阿卡纳","keywords":["丰盛","创造力","母性","自然","滋养"],"scene":"一个丰腴的女人坐在森林里的宝座上，头戴十二颗星的皇冠，脚边有麦穗，身后是茂密的树林和瀑布。她看起来非常满足，手持一根权杖。","questions":["她周围为什么全是植物和自然？","她给你什么感觉？","这张牌在说什么样的能量？"],"core":"女皇是大地母亲的化身，代表一切的丰盛与创造。她不只是母亲的角色，更是「让生命生长」的力量——创意、感官享受、滋养自己和他人。","upright":"丰盛、创造力旺盛、被滋养、享受感官、孕育新事物","reversed":"创造力受阻、过度依赖、不照顾自己、匮乏感","feedback":"女皇出现时往往在说：放慢下来，享受当下，让自己被滋养。在个人成长方向，她代表「活得饱满」。"},{"id":4,"name":"4号 皇帝","nameEn":"The Emperor","category":"大阿卡纳","keywords":["权威","秩序","稳定","结构","父性"],"scene":"一个老人坐在石头宝座上，宝座两侧刻着公羊头。他手持权杖和圆球，穿着盔甲，神情严肃。背景是光秃秃的红色山岩，没有植物。","questions":["为什么背景没有任何植物？","他和女皇有什么不同？","这张牌代表什么样的人？"],"core":"皇帝是规则、结构和秩序的象征。他与女皇的自然流动相对，代表人为建立的框架和权威。他给世界带来稳定，但也可能让人窒息。","upright":"稳定、权威、纪律、建立结构、父亲形象","reversed":"专制、控制欲强、过于僵化、滥用权力","feedback":"皇帝出现时往往在问：你的生活里有没有足够的结构和边界？或者，你是否被某种权威或规则压制着？"},{"id":5,"name":"5号 教皇","nameEn":"The Hierophant","category":"大阿卡纳","keywords":["传统","信仰","指引","制度","教育"],"scene":"一个身穿宗教服饰的人坐在高台上，两根柱子之间，面前跪着两个信徒。他右手做出祝福的手势，左手握着三重十字权杖。","questions":["他和女祭司有什么不同？","跪着的人为什么在听他说话？","这张牌说的是什么样的关系？"],"core":"教皇代表制度化的知识与信仰——宗教、学校、传统、师徒关系。他是知识的传递者，但他传递的是「已有的」规则，而非个人的内在智慧。","upright":"遵循传统、寻求指引、正规教育、制度内行事","reversed":"打破规则、质疑权威、个人信仰、非传统路径","feedback":"教皇出现时在问：你是在遵循别人的规则，还是真正找到了自己的信仰体系？"},{"id":6,"name":"6号 恋人","nameEn":"The Lovers","category":"大阿卡纳","keywords":["选择","关系","价值观","结合","诚实"],"scene":"一男一女站在伊甸园中，女人面向天使，男人看着女人。头顶有天使张开双翼俯视。背景是果树和火焰山。","questions":["这张牌只是在说爱情吗？","天使在这里代表什么？","男人看女人，女人看天使，说明什么？"],"core":"恋人牌的核心不只是爱情，更是「选择」——尤其是基于价值观的重要抉择。它也代表两个部分的整合，或者一段真实、诚实的关系。","upright":"重要选择、真实的关系、价值观对齐、结合","reversed":"价值观冲突、逃避选择、不诚实的关系、内心分裂","feedback":"恋人出现时往往不是在说「你会谈恋爱」，而是在说「你面临一个需要用心做的选择」。"},{"id":7,"name":"7号 战车","nameEn":"The Chariot","category":"大阿卡纳","keywords":["意志","掌控","前进","胜利","自律"],"scene":"一个战士站在战车上，战车前面有两只狮身人面像，一黑一白，方向不一。他没有用缰绳，而是靠意志力控制它们前进。","questions":["两只狮身人面像方向不同，他怎么让它们一起走？","为什么没有缰绳？","这张牌说的是什么样的力量？"],"core":"战车代表用强大的意志力驾驭内心的矛盾与冲突，朝目标前进。它不是蛮力，而是在混乱中保持方向感的能力。","upright":"强烈意志、克服障碍、专注目标、自律推进","reversed":"失控、方向混乱、强迫推进、被情绪拖走","feedback":"战车出现时在说：你有没有在驾驭自己，还是在被各种力量拉扯？"},{"id":8,"name":"8号 力量","nameEn":"Strength","category":"大阿卡纳","keywords":["内在力量","温柔","勇气","耐心","驯服"],"scene":"一个女人温柔地用双手捧住一头狮子的嘴，她头顶有∞符号，表情平静，完全不害怕。狮子没有挣扎。","questions":["她为什么不用武器或锁链？","狮子为什么没有咬她？","这张牌说的「力量」和你平时理解的力量有什么不同？"],"core":"真正的力量不是压制，而是温柔的掌控。女人代表意识，狮子代表本能和欲望——她不是打败狮子，而是与它和解。这是情绪智慧，是内在的强大。","upright":"内在勇气、温柔而坚定、驾驭情绪、耐心","reversed":"软弱、被情绪淹没、自我怀疑、压抑本能","feedback":"力量牌出现时在说：你不需要强硬，你已经有足够的内在力量去面对它——温柔地。"},{"id":9,"name":"9号 隐者","nameEn":"The Hermit","category":"大阿卡纳","keywords":["独处","内省","寻找真相","智慧","引导"],"scene":"一个老人独自站在雪山之巅，手持一根权杖，另一手高举一盏灯笼，灯笼里有一颗六芒星。四周是黑暗和孤独。","questions":["他为什么一个人站在山顶？","那盏灯是给谁照路？","这张牌说的孤独是消极的还是主动的？"],"core":"隐者选择独处，是为了寻找内在的真相。他的灯照亮的不只是自己的路，也为后来者指引。这是主动的、有目的的独处，而非逃避。","upright":"主动独处、内省、寻找答案、需要安静的时间","reversed":"孤立、拒绝帮助、过度封闭、逃避人群","feedback":"隐者出现时在问：你现在需要的是独处和向内看吗？还是你在用孤独逃避什么？"},{"id":10,"name":"10号 命运之轮","nameEn":"Wheel of Fortune","category":"大阿卡纳","keywords":["转折","因果","时机","命运","循环"],"scene":"一个巨大的轮子在空中转动，轮子上有各种符号和文字。轮子四角有四种生物：天使、鹰、狮子、公牛，各自捧着书。轮子中央有一条蛇向下，一个阿努比斯向上，顶端坐着一只狮身人面像。","questions":["轮子为什么一直在转？","有些东西往上，有些往下，这说明什么？","你觉得命运是可以掌控的吗？"],"core":"命运之轮代表生命的循环和转折点。好运和坏运都会轮转，没有什么是永恒的。它提醒我们：现在的低谷会过去，现在的高峰也会过去——顺势而为，了解时机。","upright":"好运转来、转折点、因果显现、抓住时机","reversed":"逆境持续、抵抗变化、因果未清、错过时机","feedback":"命运之轮出现时在说：变化正在发生，或即将发生。你准备好顺势而为了吗？"},{"id":11,"name":"11号 正义","nameEn":"Justice","category":"大阿卡纳","keywords":["平衡","因果","真相","公正","责任"],"scene":"一个女人坐在两根柱子之间，手持宝剑和天平。她的表情严肃而中立，眼睛睁开，直视前方。","questions":["天平和宝剑各代表什么？","她为什么眼睛睁开，不像正义女神蒙眼？","这张牌出现意味着什么？"],"core":"正义代表因果律——你的选择会带来相应的结果。它不是惩罚，而是诚实地看清真相，承担责任。天平是权衡，宝剑是清晰的决断。","upright":"因果显现、需要做公正的决定、承担责任、真相大白","reversed":"逃避责任、不公正、自欺欺人、因果未清","feedback":"正义出现时在问：你是否在诚实地面对某件事的因果？你愿意为自己的选择负责吗？"},{"id":12,"name":"12号 倒吊人","nameEn":"The Hanged Man","category":"大阿卡纳","keywords":["等待","换角度","放下","牺牲","暂停"],"scene":"一个男人被一条腿倒挂在树上，另一条腿弯曲成4字形。他的表情……出奇地平静，甚至有点安详。头顶有光晕。","questions":["他为什么看起来不痛苦？","被倒挂会看到什么不同的风景？","这张牌说的「等待」和消极等待有什么区别？"],"core":"倒吊人是主动选择暂停、换视角的牌。他的倒挂不是惩罚，而是一种开悟——有时候放下掌控、停止行动，反而能看到平时看不见的东西。","upright":"主动暂停、换角度看问题、放下执念、等待时机","reversed":"拖延、不必要的牺牲、固执、逃避改变","feedback":"倒吊人出现时在说：停下来，不是失败。试着从完全不同的角度看你现在的处境。"},{"id":13,"name":"13号 死神","nameEn":"Death","category":"大阿卡纳","keywords":["结束","转化","蜕变","放下","新生"],"scene":"一个骷髅骑士穿着黑色盔甲，骑着白马缓缓前行。前方有一个国王倒在地上，一个孩子跪着，一个女人低着头。远处两根柱子之间升起太阳。","questions":["这张牌真的是在说死亡吗？","为什么马是白色的？","远处的太阳意味着什么？"],"core":"死神几乎不代表字面上的死亡，而是「某段故事的彻底结束」。蜕变必须先有结束——旧的不去，新的不来。白马象征新生的纯洁，远处的太阳是结束后的黎明。","upright":"彻底结束、蜕变、放下旧的模式、迎接新生","reversed":"抗拒结束、死撑着不放手、停滞、拒绝改变","feedback":"死神出现时在说：有什么东西需要你放手了。不放手，新的就进不来。"},{"id":14,"name":"14号 节制","nameEn":"Temperance","category":"大阿卡纳","keywords":["平衡","耐心","融合","疗愈","中庸"],"scene":"一个天使站在水边，一只脚踩在水里，一只脚踩在陆地上。他手持两个杯子，将水在两杯之间来回倒，杯子之间有光在流动。远处有山和阳光。","questions":["他为什么一脚在水里一脚在地上？","两杯之间流动的是什么？","这张牌说的平衡是怎么实现的？"],"core":"节制代表在两种极端之间找到流动的平衡——不是静止的中点，而是像水一样在两者之间流通融合。它也代表疗愈和耐心，不急不躁。","upright":"平衡、耐心、疗愈中、融合不同元素、不走极端","reversed":"失衡、过激、缺乏耐心、内在冲突激烈","feedback":"节制出现时在说：慢下来，找到那个流动的平衡点。不需要非此即彼。"},{"id":15,"name":"15号 恶魔","nameEn":"The Devil","category":"大阿卡纳","keywords":["执念","欲望","束缚","阴影","物质"],"scene":"一个半人半兽的恶魔坐在高台上，脚下链着一男一女。但仔细看，他们的锁链很松，随时可以摘掉。恶魔头顶有一颗倒五角星。","questions":["他们为什么不逃走？","锁链是真的锁住他们了吗？","这张牌说的「束缚」来自哪里？"],"core":"恶魔代表自我创造的束缚——是执念、恐惧、上瘾或者某种阴影面。关键在于：锁链是松的，你随时可以离开，但你没有。它在问：是什么让你选择留在这个囚笼里？","upright":"执念、物质依赖、阴影面、被欲望控制、自我限制","reversed":"解脱束缚、看清执念、从上瘾中走出、面对阴影","feedback":"恶魔出现时不是在说你「坏」，而是在问：你现在被什么东西绑住了？那根链子，其实是你自己套上去的。"},{"id":16,"name":"16号 塔","nameEn":"The Tower","category":"大阿卡纳","keywords":["突变","崩塌","觉醒","清除","重建"],"scene":"一座高塔被闪电击中，顶部冠冕飞出，两个人从塔中坠落。火焰从窗口喷出，天空漆黑。","questions":["为什么是闪电击中，而不是慢慢倒塌？","那顶被击飞的皇冠代表什么？","这张牌是最坏的牌吗？"],"core":"塔代表突然的、剧烈的改变——通常是你一直回避的真相，最终用最猛烈的方式显现。它打破的是虚假的结构，让真实的地基得以重建。短痛，但是必要的清除。","upright":"突然的剧变、旧结构崩塌、强制性的觉醒、清除障碍","reversed":"避免不了的改变、推迟的崩塌、内在的动荡","feedback":"塔出现时人们通常会害怕，但它在说的其实是：那个需要倒塌的东西，本来就不该存在。倒了，才能建真正稳固的。"},{"id":17,"name":"17号 星星","nameEn":"The Star","category":"大阿卡纳","keywords":["希望","疗愈","指引","平静","恢复"],"scene":"一个女人跪在水边，一只脚踩在水里，一只脚踩在陆地，手持两个水罐，将水倒入水中和大地。头顶有一颗大星和七颗小星，天空清澈。","questions":["塔牌之后出现星星，意味着什么？","她在做什么？","这张牌给你什么感觉？"],"core":"星星紧跟在塔牌之后，代表风暴过后的宁静和疗愈。它是希望的光，是「一切会好的」的确信。不是虚假的乐观，而是在经历黑暗后真实的平静。","upright":"希望、疗愈中、找回平静、被指引、恢复信心","reversed":"失去希望、对未来悲观、疗愈受阻、迷失方向","feedback":"星星出现时在说：你经历了什么，但黑暗过去了。现在是疗愈和恢复的时候，相信那道光。"},{"id":18,"name":"18号 月亮","nameEn":"The Moon","category":"大阿卡纳","keywords":["恐惧","幻觉","潜意识","迷惑","不确定"],"scene":"一轮满月高挂，月亮上有一张脸。地面上一只狗和一只狼对着月亮嚎叫，一只龙虾从水中爬出。远处有两根柱子，中间是一条路，消失在黑暗中。","questions":["为什么有狗又有狼？","那条路通往哪里？","月光和太阳光有什么不同？"],"core":"月亮代表潜意识、恐惧和幻觉。月光是间接的光，会让东西看起来不是它本来的样子。这张牌出现时，往往意味着你正处于迷惑之中——事情可能不是你以为的那样。","upright":"困惑、被恐惧或幻觉影响、需要面对潜意识、不确定期","reversed":"走出迷惑、真相浮现、恐惧减少、直觉逐渐清晰","feedback":"月亮出现时在说：你现在看到的，不一定是真实的。你的恐惧或期待，正在扭曲你对现实的判断。"},{"id":19,"name":"19号 太阳","nameEn":"The Sun","category":"大阿卡纳","keywords":["喜悦","成功","活力","清晰","真实"],"scene":"一个小孩骑着白马，张开双臂，在向日葵花园中奔跑。头上戴着花环，背景是一轮巨大的太阳，光芒四射。一面红色旗帜迎风飘扬。","questions":["为什么是一个小孩，而不是成年人？","太阳牌是整副牌里最好的牌吗？","这张牌传递给你什么能量？"],"core":"太阳代表纯粹的喜悦、成功和生命力。孩子代表不加掩饰的真实和快乐——在太阳下，没有阴影可以藏身，一切都清晰可见。它是积极、活力和真实自我的展现。","upright":"喜悦、成功、活力充沛、清晰、真实展现自我","reversed":"过度乐观、短暂的快乐、自我中心、喜悦受阻","feedback":"太阳出现时在说：这是你真实自我发光的时候。允许自己喜悦，允许自己成功，允许自己被看见。"},{"id":20,"name":"20号 审判","nameEn":"Judgement","category":"大阿卡纳","keywords":["觉醒","召唤","重生","原谅","使命"],"scene":"一个天使从云端吹响号角，下面的人们从棺木中站起，张开双臂仰望天空。男女老少都有，他们的表情充满期待和震惊。","questions":["那个号角在召唤什么？","从棺木里站起来是什么感觉？","这和死神牌有什么不同？"],"core":"审判代表一次内在的觉醒和召唤——听见自己真正的使命，从过去的包袱中解脱。它不是外部的审判，而是你终于愿意听见内心深处那个声音。","upright":"觉醒、听见使命的召唤、原谅自己和他人、重生","reversed":"逃避召唤、无法原谅、自我怀疑、拒绝成长","feedback":"审判出现时在说：有什么东西在召唤你，一个更真实的自己，一个更大的使命。你听见了吗？"},{"id":21,"name":"21号 世界","nameEn":"The World","category":"大阿卡纳","keywords":["完成","整合","圆满","成就","新循环"],"scene":"一个女人在花环中起舞，手持两根权杖。花环是椭圆形的，象征完整的循环。四角同样有天使、鹰、狮子、公牛，与命运之轮呼应。","questions":["她在花环里为什么在跳舞？","世界牌和愚者牌有什么联系？","完成一个阶段后，下一步是什么？"],"core":"世界是大阿卡纳的最后一张，代表一个循环的圆满完成。但完成不是终点——它同时是下一段旅程的起点。愚者带着新的积累，即将开始新的循环。","upright":"圆满完成、整合所有经历、成就、准备好迎接新开始","reversed":"未完成、还差最后一步、拖延完成、逃避结束","feedback":"世界出现时在说：你做到了。这个阶段结束了，值得庆祝。然后，带着这些，准备好出发吧——就像愚者一样。"},{"id":22,"name":"宝剑A","nameEn":"Ace of Swords","category":"小阿卡纳·宝剑","keywords":["突破","清晰","真相","新想法","决断"],"scene":"一只手从云中伸出，握住一把笔直的宝剑，剑尖顶着一顶皇冠，皇冠上有月桂和棕榈叶。背景是灰白的天空和远处的山峦。","questions":["宝剑为什么是垂直向上的？","皇冠代表什么样的胜利？","这张牌带来的「清晰」是什么感觉？"],"core":"宝剑A是风元素最纯粹的力量——思维的突破和清晰。它代表一个崭新的想法、看透真相的时刻，或者做出决断的勇气。它的真相有时是锋利的，但是必要的。","upright":"思维突破、看清真相、新想法诞生、果断决定","reversed":"思维混乱、谎言、想法受阻、决断困难","feedback":"宝剑A出现时在说：你有一个清晰的认知正在形成，或者你需要用真相和清晰来突破当前的困境。"},{"id":23,"name":"宝剑七","nameEn":"Seven of Swords","category":"小阿卡纳·宝剑","keywords":["逃避","欺骗","策略","独自行动","不诚实"],"scene":"一个人在军营中，踮着脚尖，抱着五把宝剑悄悄离开，身后还留着两把插在地上。他回头看了一眼，表情得意又警惕。","questions":["他为什么要偷偷走？","为什么只拿五把，留了两把？","他的行为背后是什么心理？"],"core":"宝剑七代表背地里的行为、用小聪明走捷径，或者不愿面对的逃避。他拿不完所有剑，却也不肯放弃——这种「半途而废的欺骗」往往来自内心的矛盾。","upright":"背地行事、欺骗、逃避责任、用策略绕开问题","reversed":"被发现、回归诚实、逃避不了的真相、承认错误","feedback":"宝剑七出现时在问：你是否在某件事上不够诚实——对别人，或者对自己？"},{"id":24,"name":"宝剑八","nameEn":"Eight of Swords","category":"小阿卡纳·宝剑","keywords":["自我限制","思维困局","受困","恐惧","无力感"],"scene":"一个女人站在水边，眼睛被蒙住，双手被松松地绑着。她周围插满了宝剑，但没有一把碰到她。远处是平静的水面和城堡。","questions":["那些宝剑有没有真的伤到她？","绑住她的绳子是紧的吗？","她为什么不动？"],"core":"宝剑八代表被自己的恐惧和想法困住——剑没有碰到她，绳子是松的，她随时可以离开，但她不知道。这是思维的牢笼，是「我不行」「没有出路」的自我催眠。","upright":"被恐惧困住、思维受限、感觉无路可走、自我怀疑","reversed":"看见出路、突破心理限制、开始行动、解脱","feedback":"宝剑八出现时在说：困住你的不是外部环境，是你自己的想法。摘掉那块蒙眼布，你会发现路一直在那里。"},{"id":25,"name":"宝剑十","nameEn":"Ten of Swords","category":"小阿卡纳·宝剑","keywords":["终结","至暗时刻","痛苦到头","黎明","放下"],"scene":"一个人面朝下倒在地上，背上插着十把宝剑。天空一半漆黑，一半已经泛起金色的曙光。远处是平静的水面。","questions":["背上插十把剑，意味着什么？","为什么天空一半黑一半亮？","这是整副牌里最惨的牌吗？"],"core":"宝剑十代表痛苦已经到达极限——十把剑，不可能更多了，也就意味着只能往上走。那道曙光是关键：最黑暗的时刻已经过去，新的开始就在眼前。","upright":"某段故事彻底结束、至暗已过、可以放下了、新开始临近","reversed":"不愿承认结束、勉强支撑、缓慢的结束","feedback":"宝剑十出现时在说：这件事已经结束了，你已经撑过来了。现在需要做的，只是放下，然后迎接那道光。"},{"id":26,"name":"圣杯A","nameEn":"Ace of Cups","category":"小阿卡纳·圣杯","keywords":["新感情","情感流动","直觉开启","爱","疗愈"],"scene":"一只手从云中伸出，托着一个溢出的圣杯，圣杯中流出五条水流，落入下方的莲花池。一只白鸽衔着圣饼飞向杯中。","questions":["为什么杯子是溢出来的？","那五条水流代表什么？","这张牌传递给你什么样的情感？"],"core":"圣杯A是水元素最纯粹的力量——情感和直觉的新开始。那溢出的杯子代表爱是丰盛的、充足的，多到可以流出来滋养周围。它是感情、直觉或创意的全新开启。","upright":"新感情、情感开放、直觉增强、爱的能量、疗愈开始","reversed":"情感受阻、压抑感受、拒绝爱、直觉关闭","feedback":"圣杯A出现时在说：有什么新的情感或直觉正在向你流来，你愿意敞开心接受吗？"},{"id":27,"name":"权杖A","nameEn":"Ace of Wands","category":"小阿卡纳·权杖","keywords":["新开始","激情","创造力","行动冲动","火花"],"scene":"一只手从云中伸出，握着一根还在生长着嫩叶的权杖。背景是远处的城堡和山丘，天空明亮。","questions":["权杖上为什么还在长叶子？","你感受到这张牌的能量是什么？","它和宝剑A有什么不同？"],"core":"权杖A是火元素最纯粹的力量——行动和激情的火花。权杖上冒出的嫩叶说明这是充满生命力的新开始，是创意的种子，是「我想做！」的那一刻冲动。","upright":"激情点燃、新项目开始、创造力爆发、行动的冲动","reversed":"创意受阻、缺乏动力、好的开头半途而废、方向不明","feedback":"权杖A出现时在说：你内心有一团火在燃起。不要让它熄灭，现在就行动。"},{"id":28,"name":"星币A","nameEn":"Ace of Pentacles","category":"小阿卡纳·星币","keywords":["物质新开始","机会","稳定","实际行动","丰盛"],"scene":"一只手从云中伸出，托着一枚金色的星币。下方是一个花园拱门，门后是绿色的草地和远处的山。","questions":["为什么背景是花园而不是荒野？","星币和其他花色的A有什么不同？","这张牌说的「新开始」是哪方面的？"],"core":"星币A是土元素最纯粹的力量——物质和现实层面的新机会。它代表一个实际的、可触摸的开始：新工作、新收入、新的物质基础。它强调「落地」，不只是想法。","upright":"物质上的新机会、新工作或收入、实际项目启动、财务新开始","reversed":"机会错失、物质计划受阻、好高骛远、不切实际","feedback":"星币A出现时在说：有一个实际的、物质层面的机会在你面前。它需要你真实地去做，而不只是想想。"},{"id":29,"name":"权杖2号","nameEn":"2 of Wands","category":"小阿卡纳·权杖","keywords":["规划","远见","掌控全局","等待时机"],"scene":"一个男人背对我们站在城堡阳台上，手持两根权杖，俯视大海和远方的山脉。他手里还捧着一个小地球。","questions":["他为什么看向远方？","手里的小地球说明什么？","这张牌说的是哪个阶段的状态？"],"core":"权杖二代表已经迈出第一步后的规划阶段。他手里的地球是「世界尽在掌握」的自信，但他还在等待最好的时机出发。","upright":"规划未来、掌握资源、等待时机出发、有远见","reversed":"缺乏规划、犹豫不决、过于保守、错失时机","feedback":"权杖二出现时在说：方向已定，资源在手，现在需要的是决定何时出发。"},{"id":30,"name":"权杖3号","nameEn":"3 of Wands","category":"小阿卡纳·权杖","keywords":["等待结果","远见","扩张","期待"],"scene":"一个男人站在悬崖边，背对我们，看着远处海上的三艘船。他手持一根权杖，身旁还有两根。","questions":["他为什么背对我们？","那三艘船在做什么？","等待和权杖二的等待有什么不同？"],"core":"权杖三代表已经播种、正在等待收获的阶段。那些船是已经出发的计划，他在等它们满载而归。这是充满期待的等待，而非焦虑。","upright":"等待计划落地、扩展视野、期待好消息、有耐心","reversed":"延误、计划受阻、等待结果时焦虑、缺乏耐心","feedback":"权杖三出现时在说：你已经做了该做的，现在是等待的时候，相信它会回来。"},{"id":31,"name":"权杖4号","nameEn":"4 of Wands","category":"小阿卡纳·权杖","keywords":["庆祝","稳定","归属感","里程碑"],"scene":"两个人在装饰着花朵的四根权杖下欢庆，背景是一座城堡。人们举起花束，氛围喜庆热烈。","questions":["为什么要建这个花朵拱门？","这个庆祝是结束还是开始？","这张牌给你什么感觉？"],"core":"权杖四是塔罗里最喜庆的牌之一，代表阶段性的成功和庆祝。它也代表家、归属感和稳定的基础。是值得停下来庆祝的时刻。","upright":"庆祝成就、家庭和谐、稳定基础、里程碑","reversed":"庆祝受阻、家庭不和、缺乏归属感、不稳定","feedback":"权杖四出现时在说：停下来庆祝一下吧，你值得这个时刻。"},{"id":32,"name":"权杖5号","nameEn":"5 of Wands","category":"小阿卡纳·权杖","keywords":["竞争","冲突","混乱","磨合"],"scene":"五个人手持权杖互相争斗，看起来混乱无序，但没有人真的受伤。","questions":["他们为什么在打架？","有没有人看起来会赢？","这种冲突是破坏性的还是有活力的？"],"core":"权杖五代表竞争和冲突——但这种冲突往往是成长必经的摩擦，而非真正的敌意。像团队磨合期或创意碰撞，乱中有能量。","upright":"竞争激烈、观点碰撞、活力冲突、需要协调","reversed":"冲突结束、找到方向、压抑冲突、逃避竞争","feedback":"权杖五出现时在说：现在可能有些乱，但这种摩擦是前进必要的过程。"},{"id":33,"name":"权杖6号","nameEn":"6 of Wands","category":"小阿卡纳·权杖","keywords":["胜利","认可","领导力","成功"],"scene":"一个骑马的人头戴桂冠凯旋，手持权杖，周围的人群夹道欢迎，有人也举着权杖。","questions":["他为什么骑在马上而不是走路？","周围的人为什么支持他？","这个胜利是如何得来的？"],"core":"权杖六是胜利和被认可的牌。他的成功是公开的、被众人看见的。这张牌也说明领导力——他的胜利带动了整个群体。","upright":"成功被认可、公众胜利、自信领导、好消息","reversed":"傲慢、胜利迟来、不被认可、领导失败","feedback":"权杖六出现时在说：你的努力正在被看见，值得自信地接受这份认可。"},{"id":34,"name":"权杖7号","nameEn":"7 of Wands","category":"小阿卡纳·权杖","keywords":["坚守立场","挑战","防御","勇气"],"scene":"一个男人站在高处，独自面对从下方伸来的六根权杖，手持一根权杖防守，表情坚定。","questions":["他为什么占据高处？","一个人对抗六根权杖，他有优势吗？","这种处境需要什么样的心态？"],"core":"权杖七代表在压力下坚守自己的立场。他占据高地——这是他的优势。面对众多挑战，他没有逃，而是选择守住自己的位置。","upright":"坚定立场、勇于面对挑战、保护所得、不妥协","reversed":"放弃、被压倒、过度防御、筋疲力竭","feedback":"权杖七出现时在说：你处于被挑战的位置，但你有优势。坚持住，不要轻易让步。"},{"id":35,"name":"权杖8号","nameEn":"8 of Wands","category":"小阿卡纳·权杖","keywords":["快速行动","消息迅速","推进","动力十足"],"scene":"八根权杖在空中飞速移动，方向一致，像箭矢一样朝着某个目标射去。没有人物，只有动态的权杖和明亮的天空。","questions":["为什么画面里没有人？","八根都朝同一方向说明什么？","这张牌给你什么样的能量感受？"],"core":"权杖八是塔罗里动感最强的牌之一，代表快速推进和充沛的行动力。事情正在快速发展，信息快速传递。是「一切都动起来了」的状态。","upright":"快速推进、好消息迅速到来、行动力强、效率高","reversed":"延误、计划卡壳、速度过快失控、消息混乱","feedback":"权杖八出现时在说：现在是快速行动的时机，不要犹豫，乘势而上。"},{"id":36,"name":"权杖9号","nameEn":"9 of Wands","category":"小阿卡纳·权杖","keywords":["坚韧","防御","疲惫中坚持","接近终点"],"scene":"一个疲惫的男人靠在一根权杖上，头部有伤，但他仍然警惕地看向前方，身后还有八根权杖站立。","questions":["他看起来受伤了，为什么没有放弃？","他背后的权杖代表什么？","这种坚持是智慧还是固执？"],"core":"权杖九代表在精疲力竭中的最后坚持。他受伤了，疲惫了，但还没到放弃的时候。他守住了这么多，再坚持一下就能看到终点。","upright":"坚韧不拔、接近成功、在逆境中守住、不轻易认输","reversed":"精疲力竭真的坚持不了、需要休息、过度防御、多疑","feedback":"权杖九出现时在说：你已经撑了这么久，终点就在眼前。这不是放弃的时候。"},{"id":37,"name":"权杖10号","nameEn":"10 of Wands","category":"小阿卡纳·权杖","keywords":["重负","过度承担","坚持到底","即将到达"],"scene":"一个男人弯腰驼背，费力地抱着十根权杖向前走，压得他几乎看不到前方的路和远处的村庄。","questions":["他为什么要一次抱这么多？","他能放下几根吗？","他抱着这些是为了什么？"],"core":"权杖十代表承担了过多的重量——可能是责任、压力或自己强加给自己的负担。他快到了，但这一路太沉。有时候需要学会放下一些才能更好地前进。","upright":"承担过多、快到终点了但很累、责任重大、需要放下一些","reversed":"终于放下负担、寻求帮助、拒绝过度承担","feedback":"权杖十出现时在问：你现在抱着的这些，哪些是真正需要你扛的？哪些可以放下？"},{"id":38,"name":"权杖侍者","nameEn":"侍者 of Wands","category":"小阿卡纳·权杖","keywords":["热情初学者","探索","新想法","冲劲十足"],"scene":"一个年轻人充满热情地举起一根权杖，凝视着它，站在开阔的平原上，远处有山。他看起来跃跃欲试。","questions":["他为什么这么专注地看着那根权杖？","他看起来有经验吗？","这张牌代表什么样的人或状态？"],"core":"权杖侍者代表充满热情但经验尚浅的状态。他对新事物充满好奇和冲劲，但还需要磨练。像刚开始一件新事的你——满腔热血，愿意学习。","upright":"热情探索、新想法涌现、学习欲强、冒险精神","reversed":"冲动莽撞、半途而废、想法多行动少、缺乏耐心","feedback":"权杖侍者出现时在说：你有好的开始和热情，保持这股劲，同时也要有耐心把它做下去。"},{"id":39,"name":"权杖骑士","nameEn":"骑士 of Wands","category":"小阿卡纳·权杖","keywords":["冲劲","激情","行动力强","冒险"],"scene":"一个骑士骑着奔腾的马，高举权杖冲向前方，马腾空而起，骑士表情勇猛。","questions":["他的马为什么是奔腾的？","他有没有在看路？","这种冲劲是优势还是风险？"],"core":"权杖骑士是塔罗里行动力最强的牌之一。他充满激情和冲劲，义无反顾地向前冲。优点是能量强大，缺点是可能冲动、不计后果。","upright":"行动力爆棚、充满激情、勇往直前、追求冒险","reversed":"冲动鲁莽、缺乏计划、半途而废、暴躁","feedback":"权杖骑士出现时在说：你有强大的行动力，很好。但记得偶尔看看路，方向比速度更重要。"},{"id":40,"name":"权杖王后","nameEn":"王后 of Wands","category":"小阿卡纳·权杖","keywords":["自信","热情","独立","创造力","温暖"],"scene":"一位女王坐在宝座上，宝座装饰着狮子和向日葵。她手持权杖，脚边坐着一只黑猫，神情自信温暖，面向太阳方向。","questions":["她脚边的黑猫代表什么？","她的自信和皇帝有什么不同？","这张牌给你什么感觉？"],"core":"权杖王后是火元素中最成熟的女性能量——她自信、热情、有创造力，同时也有温暖和魅力。她知道自己想要什么，并且能感染身边的人。","upright":"自信独立、充满魅力、热情感染他人、创造力强","reversed":"嫉妒、控制欲、过于强势、焦虑不安全感","feedback":"权杖王后出现时在说：活出你最自信的那一面，你的热情和魅力是你最大的资产。"},{"id":41,"name":"权杖国王","nameEn":"国王 of Wands","category":"小阿卡纳·权杖","keywords":["领导力","远见","魄力","成熟的火元素"],"scene":"一位国王坐在宝座上，宝座装饰着火蜥蜴（salamander）图案。他手持权杖，神情睿智而威严，背景是热烈的色调。","questions":["火蜥蜴在这里代表什么？","这个国王和皇帝有什么区别？","成为权杖国王需要什么？"],"core":"权杖国王是火元素能量的最高表达——有远见的领导者，能感染他人，敢于冒险但不失智慧。他把激情变成了事业和影响力。","upright":"成熟领导力、有远见、魄力十足、激励他人","reversed":"独裁、冲动决策、傲慢、无法承担责任","feedback":"权杖国王出现时在说：用你的激情和远见去领导，但要把冲劲转化为智慧。"},{"id":42,"name":"圣杯2号","nameEn":"2 of Cups","category":"小阿卡纳·圣杯","keywords":["相互连接","情感交流","合作","关系建立"],"scene":"一男一女面对面站立，各持一个圣杯，准备交换。他们之间有一根赫尔墨斯之杖，上方有一个狮子头。","questions":["他们为什么要交换杯子？","那根赫尔墨斯之杖代表什么？","这张牌只是在说爱情吗？"],"core":"圣杯二代表两个人或两种力量之间的相互认可和连接。它可以是爱情，也可以是合作关系、友谊——任何真诚的双向情感交流。","upright":"建立深刻连接、互相认可、合作愉快、感情开始","reversed":"关系不平衡、单方面付出、合作破裂、失去连接","feedback":"圣杯二出现时在说：这段关系是双向的、平等的。珍惜这种真实的相互看见。"},{"id":43,"name":"圣杯3号","nameEn":"3 of Cups","category":"小阿卡纳·圣杯","keywords":["友谊","庆祝","社群","喜悦"],"scene":"三个女人举起圣杯欢庆，她们跳舞庆祝，周围是丰收的果实和花朵。","questions":["她们在庆祝什么？","三个人一起和两个人有什么不同？","这种庆祝的能量是什么？"],"core":"圣杯三是友情和共同庆祝的牌。不只是两个人，而是群体的连结和喜悦。代表朋友间的真实情谊、团队的成功、或值得一起庆祝的时刻。","upright":"友情深厚、聚会庆祝、团队喜悦、共同成功","reversed":"过度沉溺于社交、三角关系、友情出现裂缝","feedback":"圣杯三出现时在说：和你爱的人一起庆祝，这种共同的喜悦是礼物。"},{"id":44,"name":"圣杯4号","nameEn":"4 of Cups","category":"小阿卡纳·圣杯","keywords":["冥想","内省","不满","忽视机会","情感疲倦"],"scene":"一个男人坐在树下冥想，双臂交叉，看着地上的三个圣杯，对旁边一只手从云中伸出来的第四个圣杯视而不见。","questions":["他为什么忽视那个被递过来的圣杯？","他盯着地上的杯子在想什么？","这是一种消极状态吗？"],"core":"圣杯四代表一种内向的、对现有的不满足，同时又对新的机会不感兴趣的状态。可能是疲惫、情感麻木，或者太沉浸在自己的世界里而错过了礼物。","upright":"需要独处反思、对现状不满、情感麻木、错过机会","reversed":"走出内省、重新看见机会、情感觉醒、接受新事物","feedback":"圣杯四出现时在问：你是否在某种情感上关闭了？有没有你一直在忽视的好东西？"},{"id":45,"name":"圣杯5号","nameEn":"5 of Cups","category":"小阿卡纳·圣杯","keywords":["悲伤","失去","只看损失","忽视剩余"],"scene":"一个穿黑色斗篷的人低着头，看着前方倒了的三个圣杯，而身后还有两个完好的圣杯立着。远处有一座桥和城堡。","questions":["他为什么只看倒掉的，不看完好的？","那座桥在这里意味着什么？","这种悲伤是必要的吗？"],"core":"圣杯五代表因为失去而悲伤，但陷得太深以至于看不见还剩下什么。那两个完好的圣杯就在身后，路还在，但他还没有转身。","upright":"悲伤失落、只关注失去的、需要哀悼但也要放下","reversed":"开始走出悲伤、转身看见剩余、接受失去、重新出发","feedback":"圣杯五出现时在说：允许自己悲伤，但别忘了，还有两个杯子完好无损地等着你转身。"},{"id":46,"name":"圣杯6号","nameEn":"6 of Cups","category":"小阿卡纳·圣杯","keywords":["怀旧","童年","纯真","过去的美好","给予"],"scene":"一个大一点的孩子把装满花的圣杯递给一个小一点的孩子，背景是老式村庄，气氛温暖宁静。","questions":["这两个孩子的关系是什么？","为什么杯子里装的是花？","这张牌让你想起了什么？"],"core":"圣杯六是最充满温情的牌之一，代表对过去美好的怀念，或者像孩子一样纯真的给予和接受。也可能代表旧情重燃，或需要从过去汲取力量。","upright":"怀念美好过去、童年记忆、纯真给予、旧友重逢","reversed":"活在过去、逃避现实、对过去的美化","feedback":"圣杯六出现时在说：有时候回望过去是为了汲取力量，但记得过去是用来感受的，不是用来逃到里面的。"},{"id":47,"name":"圣杯7号","nameEn":"7 of Cups","category":"小阿卡纳·圣杯","keywords":["幻想","过多选择","白日梦","迷失"],"scene":"一个人的剪影站在前方，看着七个漂浮在云中的圣杯，每个杯子里都有不同的东西：城堡、宝石、月桂冠、龙、蛇、人脸、发光的人影。","questions":["这些杯子里的东西都是真实的吗？","他为什么犹豫不决？","太多选择是好事还是坏事？"],"core":"圣杯七代表被想象和幻觉淹没——太多的可能性让人迷失，分不清哪些是真实的机会，哪些只是幻觉。需要落地，做出真实的选择。","upright":"过多选择令人迷惑、活在幻想中、缺乏行动、理想化","reversed":"开始落地行动、从幻想回到现实、做出选择、清醒","feedback":"圣杯七出现时在说：想象力很美好，但你现在需要选一个，然后真的去做。"},{"id":48,"name":"圣杯8号","nameEn":"8 of Cups","category":"小阿卡纳·圣杯","keywords":["离开已有的","寻找更深意义","放弃表面成功","精神探索"],"scene":"一个人在夜晚，背对我们，拄着拐杖，走向远处的山脉，留下了八个整齐排列的圣杯。月亮高挂，一半明一半暗。","questions":["他为什么离开那八个杯子？","他去寻找什么？","这种离开需要多大的勇气？"],"core":"圣杯八代表主动离开已经拥有的一切，去寻找更深层的意义和满足感。那八个杯子整齐完好，不是因为失败，而是发现这些不够——他需要更真实的东西。","upright":"主动放弃不再满足的、追寻更深意义、精神上的探索","reversed":"害怕放弃、维持表面成功但内心空洞、逃避","feedback":"圣杯八出现时在说：有时候离开一个好的处境，是为了找到一个真实的处境。"},{"id":49,"name":"圣杯9号","nameEn":"9 of Cups","category":"小阿卡纳·圣杯","keywords":["愿望成真","满足感","物质充裕","心满意足"],"scene":"一个满足的男人抱臂坐在椅子上，身后有一排九个圣杯，摆放整齐，像在展示。他看起来非常自得其乐。","questions":["他为什么那么满足？","那些杯子是给别人看的还是他自己的满足？","这种满足是真实的吗？"],"core":"圣杯九被称为「愿望牌」，代表心满意足、愿望实现。但那些展示性的圣杯也提示：这种满足有时带有一点炫耀意味。整体是积极的——你得到了你想要的。","upright":"愿望实现、情感满足、物质丰盛、享受人生","reversed":"表面满足内心空虚、物质有了但情感缺失、过度自满","feedback":"圣杯九出现时在说：你得到了你想要的，好好享受这个时刻。"},{"id":50,"name":"圣杯10号","nameEn":"10 of Cups","category":"小阿卡纳·圣杯","keywords":["圆满家庭","情感完整","幸福","长久关系"],"scene":"一对夫妻站在一起，两个孩子在旁边跳舞，他们都举起手看着天空彩虹上的十个圣杯。背景是美好的家园。","questions":["全家人一起看天上的彩虹，这象征什么？","这张牌和圣杯九有什么不同？","这种幸福的条件是什么？"],"core":"圣杯十是情感和关系领域最圆满的牌，代表家庭的幸福、长久的爱和情感的完整。它不只是个人满足，而是与他人共享的圆满。","upright":"家庭幸福、关系圆满、情感完整、幸福的归宿","reversed":"家庭不和、幸福表面之下有裂缝、情感圆满迟来","feedback":"圣杯十出现时在说：这种与他人共享的幸福，是最深层的情感满足。"},{"id":51,"name":"圣杯侍者","nameEn":"侍者 of Cups","category":"小阿卡纳·圣杯","keywords":["直觉初开","情感探索","创意灵感","天真好奇"],"scene":"一个年轻人站在海边，双手捧着一个圣杯，一条鱼从杯中探出头来，和他对视。他看起来很惊讶也很好奇。","questions":["那条鱼从杯中探头代表什么？","他们对视是什么感觉？","这张牌说的是什么样的状态？"],"core":"圣杯侍者代表情感和直觉刚开始觉醒的状态——像一个初次感受到内心声音的人，对自己的感受充满好奇。那条鱼是潜意识在打招呼。","upright":"直觉初醒、情感探索、灵感出现、天真的情感","reversed":"情感不成熟、过于幻想、逃避感受、创意受阻","feedback":"圣杯侍者出现时在说：你的直觉和内心在向你说话，试着停下来听一听。"},{"id":52,"name":"圣杯骑士","nameEn":"骑士 of Cups","category":"小阿卡纳·圣杯","keywords":["浪漫","追求","情感行动","温柔前进"],"scene":"一个骑士骑着慢步前行的白马，平静地端着一个圣杯，眼神温柔而专注。马的步伐稳重，不像权杖骑士那样奔腾。","questions":["为什么他的马走得这么慢？","他端着杯子那么小心，里面装的是什么？","这个骑士和权杖骑士有什么不同？"],"core":"圣杯骑士代表用情感驱动的行动——他是浪漫的追求者，用温柔和耐心前进，而非速度和冲劲。他带来情感上的邀请或追求。","upright":"浪漫追求、情感投入、温柔有耐心、带来爱的邀请","reversed":"过于理想化、情感逃避、优柔寡断、感情不稳定","feedback":"圣杯骑士出现时在说：慢下来，用心感受，情感上的事急不来。"},{"id":53,"name":"圣杯王后","nameEn":"王后 of Cups","category":"小阿卡纳·圣杯","keywords":["深度情感","直觉","同理心","疗愈"],"scene":"一位女王坐在海边的宝座上，宝座装饰着海洋和美人鱼图案。她凝视着手中精美的圣杯，神情深沉而温柔。","questions":["她为什么盯着那个杯子看？","海边的背景说明什么？","她给你什么感觉？"],"core":"圣杯王后是水元素中最深邃的情感能量——她有强大的直觉和同理心，能深度感受他人的情绪。她是天生的疗愈者和倾听者。","upright":"深度直觉、强大同理心、情感滋养、疗愈能力","reversed":"情绪淹没、过度共情、情感操控、不健康的情感依赖","feedback":"圣杯王后出现时在说：你的直觉和同理心是礼物，但也要记得照顾好自己的情感边界。"},{"id":54,"name":"圣杯国王","nameEn":"国王 of Cups","category":"小阿卡纳·圣杯","keywords":["情感成熟","平静智慧","有担当的关怀"],"scene":"一位国王坐在海边的宝座上，宝座漂浮在水面，海浪在他身后涌动，但他保持平静。手持权杖和圣杯，神情沉稳。","questions":["宝座在水面上，他怎么保持稳定？","他手里同时持着权杖和圣杯意味着什么？","情感成熟的人是什么样子？"],"core":"圣杯国王是情感成熟的最高表达——他能在情绪的波浪中保持平静和稳定。他既感受得到情感，又不被情感淹没。是可以依赖的情感支柱。","upright":"情感成熟、平静智慧、有担当的关怀、情绪稳定","reversed":"情感压抑、用理性逃避感受、冷漠、情绪爆发","feedback":"圣杯国王出现时在说：真正的情感力量不是不感受，而是感受了还能保持稳定。"},{"id":55,"name":"宝剑2号","nameEn":"2 of Swords","category":"小阿卡纳·宝剑","keywords":["僵局","两难选择","暂时休战","刻意不看"],"scene":"一个女人坐在椅子上，眼睛蒙着布，双手各持一把宝剑交叉于胸前。身后是平静的海，月亮高挂。","questions":["她为什么蒙眼又拿剑？","那种姿势是防御还是平衡？","她在等待什么？"],"core":"宝剑二代表刻意回避做决定的状态——蒙眼是不愿看清，双剑交叉是维持表面平衡。这是一个暂时的僵局，需要最终做出选择。","upright":"暂时的平衡、回避决定、两难之中、停战","reversed":"准备好做决定了、真相无法再回避、僵局打破","feedback":"宝剑二出现时在说：你一直在回避某个决定，但那个选择迟早要做。摘下眼罩，看清它。"},{"id":56,"name":"宝剑3号","nameEn":"3 of Swords","category":"小阿卡纳·宝剑","keywords":["心痛","背叛","悲伤","失去"],"scene":"一颗红心被三把宝剑刺穿，背景是灰色的阴云和倾盆大雨。","questions":["这张牌是整副牌里最痛的吗？","那场雨在这里代表什么？","这种痛是可以过去的吗？"],"core":"宝剑三是最直接表达痛苦的牌——心被剑刺穿，毫无遮掩。它代表情感上的伤害、失去或背叛。雨会停，伤会愈合，但此刻是真实的痛。","upright":"心痛、背叛、失去、悲伤需要被感受","reversed":"走出痛苦、开始愈合、放下悲伤","feedback":"宝剑三出现时在说：这种痛是真实的，允许自己感受它。但记得，雨总会停的。"},{"id":57,"name":"宝剑4号","nameEn":"4 of Swords","category":"小阿卡纳·宝剑","keywords":["休息","恢复","冥想","暂时撤退"],"scene":"一个骑士躺在教堂石棺上，双手合十，像是在沉睡。墙上挂着三把宝剑，旁边有一把剑摆在他身边。彩色玻璃窗透进柔和的光。","questions":["他是死了还是在休息？","为什么在教堂里？","主动休息和被迫停下有什么区别？"],"core":"宝剑四代表必要的休息和恢复。他不是死去，而是主动放下战斗，给自己时间恢复。在经历宝剑三的痛苦之后，这是愈合必需的空间。","upright":"主动休息、疗愈期、需要冥想和静默、恢复力量","reversed":"无法休息、被迫停下、恢复后重新出发","feedback":"宝剑四出现时在说：停下来不是失败，而是为了更好地前进。给自己许可休息。"},{"id":58,"name":"宝剑5号","nameEn":"5 of Swords","category":"小阿卡纳·宝剑","keywords":["空洞的胜利","冲突后的失败感","羞辱","不光彩的赢"],"scene":"一个男人得意地捡起地上的宝剑，远处两个人垂头丧气地离开。天空中乌云翻涌。","questions":["赢了的人看起来快乐吗？","输的人去哪里了？","这场胜利的代价是什么？"],"core":"宝剑五代表一场代价高昂的胜利——即使赢了，也失去了某些重要的东西。可能是关系、尊严或道义。这种「赢」让双方都没有真正获益。","upright":"赢得了但代价高昂、冲突留下伤痕、不诚实的竞争","reversed":"和解、接受失败并从中学习、选择放下争斗","feedback":"宝剑五出现时在问：这场争斗值得吗？有没有可能放下，不是输，而是智慧地选择不战？"},{"id":59,"name":"宝剑6号","nameEn":"6 of Swords","category":"小阿卡纳·宝剑","keywords":["过渡","离开困境","平静的旅程","疗愈中前进"],"scene":"一个船夫撑船，船上有一个女人和一个孩子，他们低着头，船旁插着六把宝剑。他们正在缓缓驶向平静的对岸。","questions":["他们为什么低着头？","那六把剑插在船上说明什么？","他们去的地方比来的地方更好吗？"],"core":"宝剑六代表从困难走向平静的过渡期。他们带着过去的创伤（那些剑）上路，但正在驶向更平静的水域。不是全好了，但在慢慢好转。","upright":"走出困境、过渡期、在疗愈中前进、找到平静","reversed":"无法离开困境、拒绝过渡、旧伤未愈又出发","feedback":"宝剑六出现时在说：你正在离开那段艰难时期，哪怕还带着伤，方向是对的。"},{"id":60,"name":"宝剑9号","nameEn":"9 of Swords","category":"小阿卡纳·宝剑","keywords":["焦虑","噩梦","最坏的想象","精神痛苦"],"scene":"一个人坐在床上，双手捂脸，像是从噩梦中惊醒。身后的墙上挂着九把宝剑，黑暗笼罩，床上的被子有各种图案。","questions":["那些剑挂在墙上，还是刺进了他？","他经历的是真实的危险还是内心的恐惧？","为什么是半夜？"],"core":"宝剑九代表被焦虑和最坏的想象折磨——那些剑挂在墙上，没有一把真的刺到他，但他的精神痛苦是真实的。往往是自己吓自己，但感受无比真实。","upright":"严重焦虑、噩梦、被恐惧淹没、精神上的折磨","reversed":"走出焦虑、恐惧减退、看清真相、寻求帮助","feedback":"宝剑九出现时在说：你经历的痛苦是真实的，但那些你最担心的事，真的有那么多把剑吗？"},{"id":61,"name":"宝剑侍者","nameEn":"侍者 of Swords","category":"小阿卡纳·宝剑","keywords":["好奇","敏锐","直言不讳","警觉","思维活跃"],"scene":"一个年轻人高举宝剑，警惕地四处张望，仿佛随时准备应对任何威胁。他站在多风的山丘上，头发和衣服被风吹动。","questions":["他在警惕什么？","这种警觉是智慧还是过度紧张？","他手里的剑是用来进攻还是防御？"],"core":"宝剑侍者代表思维活跃、求知欲强但有时过于警惕的状态。他充满好奇，说话直接，能快速发现问题，但可能口快心直，说话不够圆滑。","upright":"思维敏锐、直言不讳、求知欲强、警觉","reversed":"八卦、说话伤人、过度分析、缺乏耐心","feedback":"宝剑侍者出现时在说：你的敏锐是资产，但在行动之前，先确认你看到的是全貌，而不只是局部。"},{"id":62,"name":"宝剑骑士","nameEn":"骑士 of Swords","category":"小阿卡纳·宝剑","keywords":["行动迅速","直接","勇猛","有时冲动"],"scene":"一个骑士骑着奔腾的马，高举宝剑冲向前方，马腿腾空，风吹动了他的羽毛头盔，表情勇猛专注。","questions":["他的速度和方向是确定的吗？","他有没有在看路？","这种冲劲最大的风险是什么？"],"core":"宝剑骑士代表用智识和行动力冲向目标的能量——快、准、狠。他是四个骑士里最快的。优点是效率极高，风险是可能在错误的方向上全速前进。","upright":"行动迅速有效、直奔目标、有勇气面对挑战","reversed":"冲动鲁莽、争论好斗、缺乏计划、言行伤人","feedback":"宝剑骑士出现时在说：方向比速度更重要。在全速前进之前，确认你去的地方是对的。"},{"id":63,"name":"宝剑王后","nameEn":"王后 of Swords","category":"小阿卡纳·宝剑","keywords":["清晰","独立","智慧","直接","经历过痛苦"],"scene":"一位女王独坐高位，一手高举宝剑直指天空，另一手似乎在示意什么。她神情严肃而睿智，天空中有云，但她的眼神清澈。","questions":["她为什么独坐？","那把指向天空的剑代表什么？","她给你什么感觉——冷漠还是清醒？"],"core":"宝剑王后是经历过痛苦而变得清醒智慧的人。她可能失去过重要的东西，因此她对虚假没有耐心，追求真相和清晰。她的「冷」是智慧，不是冷漠。","upright":"清醒智慧、直接诚实、独立坚强、看穿虚假","reversed":"刻薄、用智识伤人、情感封闭、过于苛刻","feedback":"宝剑王后出现时在说：用你的清醒和智慧，但也记得有些时候，温柔也是一种力量。"},{"id":64,"name":"宝剑国王","nameEn":"国王 of Swords","category":"小阿卡纳·宝剑","keywords":["公正","权威","清晰决断","思维领导力"],"scene":"一位国王坐在宝座上，高举宝剑，神情威严而公正。宝座上刻着蝴蝶和仙女，背后天空有云朵，但他稳坐如山。","questions":["他手里的剑是权力的象征还是公正的象征？","他和宝剑王后有什么异同？","成为这种人需要什么？"],"core":"宝剑国王是思维和语言力量的最高表达——公正、客观、有清晰的判断力。他是法官、领导者、思想家，用理性和原则做决策。","upright":"公正权威、清晰决断、高度理性、思维领导力","reversed":"独裁、用规则压人、冷酷无情、思维偏执","feedback":"宝剑国王出现时在说：用你的理性和公正去判断，但记得，有些事情逻辑解决不了，还需要人情。"},{"id":65,"name":"星币2号","nameEn":"2 of Pentacles","category":"小阿卡纳·星币","keywords":["平衡多任务","灵活应对","多变局面","保持平衡"],"scene":"一个男人手持两枚星币，用∞符号的飘带将它们连接起来，在跳舞般地保持平衡。背景是波涛汹涌的海，有两艘船在浪中起伏。","questions":["他为什么在跳舞？","那个∞符号说明什么？","同时处理两件事有多难？"],"core":"星币二代表在多个现实事务之间灵活地保持平衡——财务、工作、生活的各种压力需要同时兼顾。他跳舞的姿态说明，保持平衡是可以的，但需要持续的注意力。","upright":"灵活处理多件事、保持平衡、适应变化","reversed":"失去平衡、顾此失彼、过于分散精力","feedback":"星币二出现时在说：你现在在同时处理很多事，可以做到，但记得偶尔停下来调整重心。"},{"id":66,"name":"星币3号","nameEn":"3 of Pentacles","category":"小阿卡纳·星币","keywords":["技艺精进","合作","专业","共同创造"],"scene":"一个工匠在教堂里雕刻，两个人看着他的图纸讨论。他们看起来是在合作完成一个项目。","questions":["为什么是三个人？","那份图纸代表什么？","这张牌说的「工作」有什么特别之处？"],"core":"星币三代表有技艺的工作和合作创造。它不只是「干活」，而是把技能发挥到一定水平，并与他人协作完成更大的事。是专业成长的牌。","upright":"技艺提升、专业合作、精益求精、共同创造","reversed":"技艺停滞、缺乏合作、粗心马虎、不认真对待工作","feedback":"星币三出现时在说：把你正在做的事做精，与有能力的人合作，这是通往真正成就的路。"},{"id":67,"name":"星币4号","nameEn":"4 of Pentacles","category":"小阿卡纳·星币","keywords":["守财","控制","安全感","物质执着"],"scene":"一个男人坐在城门前，紧紧抱着一枚星币，脚下踩着 es","category":"小阿卡纳·星币","keywords":["物质成就","稳定领导","可靠","成熟的土元素"],"scene":"一位国王坐在满是葡萄藤和花草装饰的宝座上，神情稳重而满足，手持权杖和星币，背后是丰盛的宫殿。","questions":["他宝座上的植物代表什么？","他和皇帝有什么区别？","物质成功的最高境界是什么样子？"],"core":"星币国王是物质成就和稳定领导力的最高表达。他通过踏实的努力和长期的坚持，建立了真正稳固的成就。他是可以信赖的，物质和精神都富足。","upright":"物质成就高、稳定可靠的领导、财富管理智慧","reversed":"贪婪、物质至上、固执保守、用金钱控制他人","feedback":"星币国王出现时在说：真正的丰盛是内外兼备的——不只有钱，还有智慧和稳定的内心。"}];
let queue = [];
let learned = new Set();
let current = null;


function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  queue = shuffle(CARDS);
  learned.clear();
  updateProgress();
  updateChips();
  showCardPicker();
  renderCardList();
}

function renderCardList() {
  const listDiv = document.querySelector('#cardListPanel > div');
  if (!listDiv) return;
  listDiv.innerHTML = CARDS.map(c => {
    const done = learned.has(c.id);
    return `<button onclick="pickCard(${c.id})" style="background:${done ? '#1a3a1a' : '#1e1a2e'};color:${done ? '#6ec86e' : '#b0a0c8'};border:1px solid ${done ? '#2a5a2a' : '#2a2440'};padding:5px 12px;border-radius:20px;cursor:pointer;font-size:0.8rem;font-family:inherit;letter-spacing:0.5px;">${c.name}</button>`;
  }).join('');
}

function showCardPicker() {
  document.getElementById('cardPickerArea').style.display = 'block';
  document.getElementById('revealArea').style.display = 'none';
  renderCardList();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function toggleCardList() {
  const panel = document.getElementById('cardListPanel');
  const btn = document.getElementById('btnToggleList');
  if (panel.style.display === 'none') {
    document.getElementById('revealArea').style.display = 'none';
    document.getElementById('cardPickerArea').style.display = 'block';
    panel.style.display = 'block';
    btn.textContent = '浏览选牌 ▲';
  } else {
    panel.style.display = 'none';
    btn.textContent = '浏览选牌 ▼';
  }
}

function pickRandom() {
  const unlearned = CARDS.filter(c => !learned.has(c.id));
  const pool = unlearned.length > 0 ? unlearned : CARDS;
  const card = pool[Math.floor(Math.random() * pool.length)];
  showCard(card);
}

function pickCard(id) {
  const card = CARDS.find(c => c.id === id);
  if (card) showCard(card);
}

function showCard(card) {
  current = card;
  document.getElementById('cardPickerArea').style.display = 'none';
  document.getElementById('revealArea').style.display = 'none';

  // 直接填充并展示牌义
  document.getElementById('revealName').textContent = card.name;
  document.getElementById('revealSub').textContent = card.nameEn + ' · ' + card.category;
  document.getElementById('revealKeywords').innerHTML =
    card.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
  document.getElementById('revealScene').textContent = card.scene;
  document.getElementById('revealCore').textContent = card.core;
  document.getElementById('revealUpright').textContent = card.upright;
  document.getElementById('revealReversed').textContent = card.reversed;
  document.getElementById('revealFeedback').textContent = card.feedback;

  document.getElementById('revealArea').style.display = 'block';

  learned.add(card.id);
  updateProgress();
  updateChips();
  renderCardList();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function showNext() {
  showCardPicker();
}

function nextCard() {
  showCardPicker();
}

function reviewAgain() {
  if (current) {
    learned.delete(current.id);
    showCard(current);
  }
}

function updateProgress() {
  const total = CARDS.length;
  const done = learned.size;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `已学 ${done} / ${total} 张（${pct}%）`;
}

function updateChips() {
  const container = document.getElementById('masteredChips');
  container.innerHTML = CARDS.map(c =>
    `<span class="chip ${learned.has(c.id) ? 'chip-learned' : 'chip-pending'}">${c.name}</span>`
  ).join('');
}

function showComplete() {
  document.getElementById('revealArea').style.display = 'none';
  document.getElementById('cardPickerArea').style.display = 'none';
  document.getElementById('completeScreen').style.display = 'block';
}

function generateFeedback(answer, card) { return ''; }

function resetAll() {
  document.getElementById('completeScreen').style.display = 'none';
  learned.clear();
  init();
}

function restart() {
  document.getElementById('completeScreen').style.display = 'none';
  init();
}

function switchTab(tab) {
  const isLearn = tab === 'learn';
  document.getElementById('module-learn').style.display = isLearn ? '' : 'none';
  document.getElementById('module-divination').style.display = isLearn ? 'none' : '';
  document.getElementById('tab-learn').style.background = isLearn ? 'linear-gradient(135deg,#a06ee0,#7040b0)' : '#1a1628';
  document.getElementById('tab-learn').style.color = isLearn ? 'white' : '#8a7a9a';
  document.getElementById('tab-divination').style.background = isLearn ? '#1a1628' : 'linear-gradient(135deg,#c9a96e,#a07840)';
  document.getElementById('tab-divination').style.color = isLearn ? '#8a7a9a' : 'white';
}

function divination(n) {
  const pool = [...CARDS];
  const picked = [];
  for (let i = 0; i < n && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    const card = pool.splice(idx, 1)[0];
    const reversed = Math.random() < 0.5; // 50% 逆位
    picked.push({ card, reversed });
  }

  const labels1 = ['当下能量'];
  const labels3 = ['过去', '现在', '未来'];
  const labels10 = ['当下处境', '阻碍', '意识层', '潜意识层', '过去影响', '近期未来', '你的态度', '外部影响', '希望与恐惧', '最终结果'];

  let labels;
  if (n === 1) labels = labels1;
  else if (n === 3) labels = labels3;
  else labels = labels10;

  const container = document.getElementById('divinationResult');
  container.style.display = 'block';

  let html = `<div style="display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;">`;
  picked.forEach(({ card, reversed }, i) => {
    const posLabel = reversed
      ? `<span style="color:#e07070;font-size:0.75rem;letter-spacing:1px;margin-left:6px;">逆位</span>`
      : `<span style="color:#6ec86e;font-size:0.75rem;letter-spacing:1px;margin-left:6px;">正位</span>`;
    const activeMeaning = reversed ? card.reversed : card.upright;
    const activeColor = reversed ? '#e07070' : '#6ec86e';
    const cardRotate = reversed ? 'transform:rotate(180deg);display:inline-block;' : '';
    html += `
    <div style="flex:1;min-width:140px;background:#1a1628;border:1px solid ${reversed ? '#5a2e2e' : '#2e3a2e'};border-radius:12px;padding:16px;cursor:pointer;" onclick="toggleCardDetail(${i})">
      <div style="color:#8a7a9a;font-size:0.75rem;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;">${labels[i] || '第'+(i+1)+'张'}</div>
      <div style="color:#c9a96e;font-size:1rem;margin-bottom:4px;"><span style="${cardRotate}">⊕</span> ${card.name} ${posLabel}</div>
      <div style="color:#6a5a7a;font-size:0.8rem;margin-bottom:8px;">${card.nameEn}</div>
      <div style="color:#8a7a9a;font-size:0.8rem;line-height:1.5;">点击展开详情</div>
      <div id="detail-${i}" style="display:none;margin-top:12px;border-top:1px solid #2a2440;padding-top:12px;">
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">${card.keywords.map(k=>`<span style="background:#2a1f4a;color:#c9a96e;padding:3px 10px;border-radius:20px;font-size:0.8rem;">${k}</span>`).join('')}</div>
        <div style="color:#d0c8e0;font-size:0.9rem;line-height:1.7;margin-bottom:10px;">${card.core}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div style="background:${!reversed ? '#1a2e1a' : '#1e1a2e'};border:1px solid ${!reversed ? '#2a5a2a' : '#2a2440'};border-radius:8px;padding:10px;">
            <div style="color:${!reversed ? '#6ec86e' : '#8a7a9a'};font-size:0.75rem;letter-spacing:1px;margin-bottom:4px;">正位${!reversed ? ' ◀ 当前' : ''}</div>
            <div style="color:#d0c8e0;font-size:0.85rem;line-height:1.6;">${card.upright}</div>
          </div>
          <div style="background:${reversed ? '#2e1a1a' : '#1e1a2e'};border:1px solid ${reversed ? '#5a2a2a' : '#2a2440'};border-radius:8px;padding:10px;">
            <div style="color:${reversed ? '#e07070' : '#8a7a9a'};font-size:0.75rem;letter-spacing:1px;margin-bottom:4px;">逆位${reversed ? ' ◀ 当前' : ''}</div>
            <div style="color:#d0c8e0;font-size:0.85rem;line-height:1.6;">${card.reversed}</div>
          </div>
        </div>
        <div style="margin-top:10px;color:#b0a0c8;font-size:0.85rem;line-height:1.7;font-style:italic;">${card.feedback}</div>
      </div>
    </div>`;
  });
  html += `</div>`;
  html += `<div style="text-align:center;margin-top:10px;"><button onclick="document.getElementById('divinationResult').style.display='none'" style="background:none;border:1px solid #3a2e5a;color:#8a7a9a;padding:6px 20px;border-radius:20px;cursor:pointer;font-size:0.85rem;font-family:inherit;">清除</button></div>`;

  container.innerHTML = html;
  container.scrollIntoView({behavior:'smooth'});
}

function toggleCardDetail(i) {
  const el = document.getElementById('detail-'+i);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

init();
</script>
</body>
</html>
